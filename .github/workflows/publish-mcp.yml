name: Publish to MCP Registry

# Publishes server.json to the official Model Context Protocol registry
# (registry.modelcontextprotocol.io) whenever it changes on main. Auth is
# GitHub OIDC — no stored secrets — which claims the io.github.licensyai
# namespace automatically from this repo's owner.
on:
  push:
    branches: [main]
    paths: ["server.json", ".github/workflows/publish-mcp.yml"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for mcp-publisher `login github-oidc`
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar -xz mcp-publisher

      - name: Validate
        run: ./mcp-publisher validate server.json

      - name: Login (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish
        run: ./mcp-publisher publish
